services:
  - type: web
    name: decklens
    runtime: docker
    plan: standard
    healthCheckPath: /healthz
    envVars:
      - key: DECKLENS_DEVICE
        value: cpu
      - key: DECKLENS_DATA_DIR
        value: /data
      - key: DECKLENS_MAX_UPLOAD_MB
        value: "100"
      - key: FAL_KEY
        sync: false
    disk:
      name: decklens-data
      mountPath: /data
      sizeGB: 10

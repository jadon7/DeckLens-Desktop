<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DeckLens Setup</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #08111f;
        color: #eef5ff;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 10% 15%, rgba(0, 207, 255, 0.18), transparent 32rem),
          radial-gradient(circle at 85% 70%, rgba(255, 215, 102, 0.12), transparent 30rem),
          #08111f;
      }

      main {
        width: min(760px, calc(100vw - 48px));
        border: 1px solid rgba(151, 180, 216, 0.24);
        border-radius: 18px;
        background: rgba(10, 21, 38, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        color: #aebdd2;
        line-height: 1.6;
      }

      button {
        border: 0;
        border-radius: 10px;
        padding: 12px 18px;
        background: #8fdcff;
        color: #06121f;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.55;
      }

      .meta {
        display: grid;
        gap: 6px;
        margin: 22px 0;
        color: #c6d3e6;
        font-size: 13px;
      }

      pre {
        min-height: 180px;
        max-height: 320px;
        overflow: auto;
        padding: 16px;
        border-radius: 12px;
        background: rgba(3, 8, 15, 0.78);
        color: #d6e7ff;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>DeckLens needs its Python runtime</h1>
      <p>
        The desktop installer keeps large Python dependencies and model files out of the app bundle.
        Install the local runtime the first time you use DeckLens; feature-specific models still download only when those features are enabled.
      </p>
      <button id="install">Install runtime</button>
      <button id="start">Start DeckLens</button>
      <div class="meta" id="meta"></div>
      <pre id="log"></pre>
    </main>
    <script>
      const installButton = document.getElementById('install');
      const startButton = document.getElementById('start');
      const meta = document.getElementById('meta');
      const log = document.getElementById('log');

      function write(line) {
        log.textContent += `${line}\n`;
        log.scrollTop = log.scrollHeight;
      }

      async function refresh() {
        const status = await window.decklensRuntime.getStatus();
        installButton.disabled = status.installing;
        startButton.disabled = !status.installed || status.installing;
        meta.innerHTML = `
          <span>Runtime installed: ${status.installed ? 'yes' : 'no'}</span>
          <span>Platform: ${status.platform} / ${status.arch}</span>
          <span>Data directory: ${status.userData}</span>
        `;
        if (!log.textContent && status.log.length) {
          log.textContent = `${status.log.join('\n')}\n`;
        }
      }

      window.decklensRuntime.onLog(write);
      installButton.addEventListener('click', async () => {
        installButton.disabled = true;
        try {
          await window.decklensRuntime.install();
        } catch (error) {
          write(error.message);
        } finally {
          await refresh();
        }
      });
      startButton.addEventListener('click', async () => {
        try {
          await window.decklensRuntime.start();
        } catch (error) {
          write(error.message);
        }
      });
      refresh();
    </script>
  </body>
</html>
